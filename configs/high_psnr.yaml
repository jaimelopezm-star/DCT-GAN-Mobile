# 🎯 CONFIGURACIÓN PARA ALTO PSNR
#
# OBJETIVO: Maximizar PSNR reduciendo el residual_scale
#
# Con residual_scale=0.1 → PSNR ~23 dB (conseguido)
# Con residual_scale=0.01 → PSNR teórico ~40 dB
#
# TRADEOFF: Menor scale = menos capacidad de embedding
# Pero el decoder debe aprender a recuperar de señales más débiles

project:
  name: "DCT-GAN-HighPSNR"
  description: "Optimizado para máximo PSNR con residual muy pequeño"
  seed: 42

data:
  dataset_name: "DIV2K"
  dataset_path: "/workspace/DIV2K_prepared"
  train_size: 640
  val_size: 80
  test_size: 80
  image_size: 256
  num_workers: 8
  pin_memory: true
  batch_size: 16

model:
  type: "dct_gan"
  
  encoder:
    type: "resnet"
    num_residual_blocks: 9
    base_channels: 64
    input_channels: 6
    use_dropout: true
    dropout_rate: 0.1
    # *** CLAVE: residual muy pequeño para alto PSNR ***
    residual_scale: 0.01    # Era 0.1 → ahora 0.01 (10x más sutil)
  
  decoder:
    type: "cnn"
    num_layers: 6
    base_channels: 64
    output_channels: 3
  
  discriminator:
    type: "xunet_modified"
    input_channels: 3
    base_channels: 32
    kernel_size: 5
    num_conv_layers: 5
    use_srm: false
    use_spectral_norm: true

dct:
  block_size: 8
  use_zig_zag: true
  frequency_selection: "chaotic_map"
  embed_in_ac: true

# ============================================================================
# LOSS: Balanceada para PSNR alto + recuperación
# ============================================================================
loss:
  # MUY alto peso a MSE (queremos stego = cover)
  alpha: 5.0
  
  # Peso moderado a recuperación (el decoder debe esforzarse más)
  beta: 5.0
  
  # Sin adversarial
  gamma: 0.0

  mse_loss:
    type: "mse"
    reduction: "mean"
  
  crossentropy_loss:
    type: "crossentropy"
    reduction: "mean"
  
  adversarial_loss:
    type: "wgan"
    clip_value: 0.01

training:
  num_epochs: 200    # Más epochs porque el residual es más sutil
  
  update_strategy:
    discriminator_updates_per_batch: 0
    generator_updates_per_batch: 1
  
  gradient_clipping:
    enabled: true
    max_norm: 1.0
  
  optimizer:
    generator:
      type: "adam"
      lr: 5.0e-4      # LR moderado
      betas: [0.9, 0.999]
      weight_decay: 0.0001
    
    discriminator:
      type: "adam"
      lr: 1.0e-4
      betas: [0.5, 0.999]
      weight_decay: 0.0001

scheduler:
  type: "step_lr"
  step_size: 50
  gamma: 0.5

hardware:
  device: "cuda"
  num_gpus: 1
  mixed_precision: false

logging:
  log_frequency: 10
  save_frequency: 10
  metrics:
    - psnr
    - ssim
    - mse
    - rmse

early_stopping:
  enabled: true
  patience: 30
  metric: "psnr"
  mode: "max"

# =============================================================================
# MATEMÁTICA:
# =============================================================================
# residual_scale = 0.01
# Diferencia máxima por pixel = 0.01 (rango [-1, 1])
# MSE máximo = 0.01² = 0.0001
# PSNR mínimo = 10*log10(1/0.0001) = 40 dB
#
# Con entrenamiento, el residual estará optimizado, esperamos:
# - PSNR: 35-45 dB
# - El decoder debe aprender a recuperar de señales muy débiles
#
# NOTA: Si la recuperación del secreto falla, probar residual_scale=0.03
# =============================================================================
