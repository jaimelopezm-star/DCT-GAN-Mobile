# Config para entrenamiento con BOSSBase dataset real
# BOSSBase: 10,000 imágenes grayscale 512×512 (convertidas a RGB 256×256)
# Objetivo: PSNR 45-55 dB en 100 epochs

project:
  name: "DCT-GAN-BOSSBase-Train"
  description: "Entrenamiento con BOSSBase dataset real - Imágenes naturales"
  seed: 42

# Dataset Configuration - BOSSBASE (REAL IMAGES)
data:
  dataset_name: "BOSSBase"
  dataset_path: "/workspace/BOSSbase_prepared"  # Path al dataset preparado
  train_size: 8000
  val_size: 1000
  test_size: 1000
  image_size: 256
  num_workers: 8
  pin_memory: true
  batch_size: 128       # Optimizado para RTX 4090

# Model Architecture (misma que sintético)
model:
  type: "dct_gan"
  
  encoder:
    type: "resnet"
    num_residual_blocks: 9
    base_channels: 16
    input_channels: 6
  
  decoder:
    type: "cnn"
    num_layers: 6
    base_channels: 16
    output_channels: 3
    activation: "relu"
  
  discriminator:
    type: "xunet_modified"
    input_channels: 3
    base_channels: 8
    kernel_size: 5
    num_conv_layers: 5
    activation: "leaky_relu"
    leaky_slope: 0.2
    use_srm: false

# DCT Configuration
dct:
  block_size: 8
  use_zig_zag: true
  frequency_selection: "chaotic_map"
  embed_in_ac: true

# Loss Functions (mismos pesos que paper)
loss:
  alpha: 0.3        # MSE loss weight
  beta: 15.0        # Secret recovery loss weight
  gamma: 0.03       # Adversarial loss weight
  
  mse_loss:
    type: "mse"
    reduction: "mean"
  
  crossentropy_loss:
    type: "crossentropy"
    reduction: "mean"
  
  adversarial_loss:
    type: "wgan"
    clip_value: 0.01

# Training Configuration - OPTIMIZADO
training:
  num_epochs: 100             # Full training (paper usa 100)
  
  update_strategy:
    discriminator_updates_per_batch: 5
    generator_updates_per_batch: 1
  
  gradient_clipping:
    enabled: true
    max_norm: 1.0
  
  optimizer:
    generator:
      type: "adam"
      lr: 1.0e-3
      betas: [0.9, 0.999]
      weight_decay: 0.005
    
    discriminator:
      type: "adam"
      lr: 5.0e-3
      betas: [0.5, 0.999]
      weight_decay: 0.005

# Learning Rate Scheduler
scheduler:
  type: "step"
  step_size: 30      # Reducir LR cada 30 epochs
  gamma: 0.5         # Multiplicar LR por 0.5

# Hardware - OPTIMIZADO
hardware:
  device: "cuda"
  num_gpus: 1
  mixed_precision: true

# Logging & Checkpoints
logging:
  log_frequency: 10           # Log cada 10 batches
  save_frequency: 10          # Guardar cada 10 epochs
  
  metrics:
    - psnr
    - ssim
    - mse
    - rmse

# Early Stopping
early_stopping:
  enabled: true
  patience: 20                # Parar si no mejora en 20 epochs
  metric: "psnr"
  mode: "max"

# Visualization
visualization:
  enabled: true
  save_frequency: 5           # Visualizar cada 5 epochs
  num_samples: 4              # Mostrar 4 ejemplos

# Checkpointing
checkpoint:
  save_best: true             # Guardar mejor modelo
  save_latest: true           # Guardar último checkpoint
  max_to_keep: 5              # Mantener últimos 5 checkpoints
