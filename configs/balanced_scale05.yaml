# 🎯 BALANCED SCALE 0.05: Punto medio entre 0.03 (falla) y 0.1 (funciona)
#
# EXPERIMENTACIÓN SISTEMÁTICA:
# - scale=0.01: Visual 79 dB, Recovery 4.75 dB ❌
# - scale=0.03: Visual 32 dB, Recovery 4.45 dB ❌
# - scale=0.05: Visual ??, Recovery ?? (TESTING)  ← PROBAMOS ESTE
# - scale=0.1:  Visual 23 dB, Recovery OK ✅
#
# HIPÓTESIS: scale=0.05 dará ~28-30 dB visual con recovery exitosa

project:
  name: "DCT-GAN-Scale-05"
  description: "Testing residual_scale=0.05 para recovery exitosa"
  seed: 42

data:
  dataset_name: "DIV2K"
  dataset_path: "/workspace/DIV2K_prepared"
  train_size: 640
  val_size: 80
  test_size: 80
  image_size: 256
  num_workers: 8
  pin_memory: true
  batch_size: 16

model:
  type: "dct_gan"
  
  encoder:
    type: "resnet"
    num_residual_blocks: 9
    base_channels: 64
    input_channels: 6
    use_dropout: true
    dropout_rate: 0.2
    # *** PUNTO MEDIO: 0.05 está entre 0.03 (falla) y 0.1 (funciona) ***
    residual_scale: 0.05
  
  decoder:
    type: "cnn"
    num_layers: 6
    base_channels: 64
    output_channels: 3
  
  discriminator:
    type: "xunet_modified"
    input_channels: 3
    base_channels: 32
    kernel_size: 5
    num_conv_layers: 5
    use_srm: false
    use_spectral_norm: true

dct:
  block_size: 8
  use_zig_zag: true
  frequency_selection: "chaotic_map"
  embed_in_ac: true

loss:
  # Weights balanceados (aprendimos que beta=8 sacrifica PSNR)
  alpha: 5.0
  beta: 5.0
  gamma: 0.0

  mse_loss:
    type: "mse"
    reduction: "mean"
  
  crossentropy_loss:
    type: "crossentropy"
    reduction: "mean"
  
  adversarial_loss:
    type: "wgan"
    clip_value: 0.01

training:
  num_epochs: 150
  
  update_strategy:
    discriminator_updates_per_batch: 0
    generator_updates_per_batch: 1
  
  gradient_clipping:
    enabled: true
    max_norm: 1.0
  
  optimizer:
    generator:
      type: "adam"
      lr: 2.0e-4   # Learning rate bajo para estabilidad
      betas: [0.9, 0.999]
      weight_decay: 0.0001
    
    discriminator:
      type: "adam"
      lr: 1.0e-4
      betas: [0.5, 0.999]
      weight_decay: 0.0001

scheduler:
  type: "step_lr"
  step_size: 50
  gamma: 0.5

hardware:
  device: "cuda"
  num_gpus: 1
  mixed_precision: false

logging:
  log_frequency: 10
  save_frequency: 10
  metrics:
    - psnr
    - ssim
    - mse
    - rmse

early_stopping:
  enabled: true
  patience: 50
  metric: "psnr"
  mode: "max"

# =============================================================================
# EXPECTATIVAS CON residual_scale=0.05:
# =============================================================================
# Basándonos en evidencia experimental:
# - scale=0.1 da 23 dB pero funciona
# - scale=0.03 da 32 dB pero NO funciona
#
# Predicción para scale=0.05:
# - PSNR visual: ~27-29 dB (entre 23 y 32)
# - Recovery: >20 dB (EXITOSA)
# - Este es probablemente el mejor balance posible
# =============================================================================
