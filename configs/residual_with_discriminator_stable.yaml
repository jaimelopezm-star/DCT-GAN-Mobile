# 🎯 CONFIGURACIÓN: RESIDUAL + DISCRIMINATOR 5D:1G (VERSIÓN ESTABLE)
#
# BASADO EN EXPERIMENTO 13 que colapsó en epoch 17 con NaN
#
# CAMBIOS PARA ESTABILIDAD:
# 1. Learning rate D: 0.0005 → 0.0001 (5× más bajo)
# 2. Learning rate G: 0.001 → 0.0005 (2× más bajo)
# 3. Gamma (adversarial): 1.0 → 0.5 (menos peso adversarial)
# 4. Betas discriminator: [0.5, 0.999] → [0.0, 0.9] (más estable)
# 5. Weight decay aumentado: 0.0001 → 0.001 (regularización)
#
# OBSERVACIÓN DEL EXPERIMENTO 13:
# - Epochs 1-3: Excelente progreso (25→30→35 dB) ✅
# - Epoch 4-16: Estabilizado en ~20 dB pero D(x) muy negativo
# - Epoch 17: NaN (colapso por gradientes) ❌

project:
  name: "DCT-GAN-Residual-Adversarial-Stable"
  description: "Residual + 5D:1G with STABLE hyperparameters (post-collapse fix)"
  seed: 42

data:
  dataset_name: "DIV2K"
  dataset_path: "/workspace/DIV2K_prepared"
  train_size: 640
  val_size: 80
  test_size: 80
  image_size: 256
  num_workers: 8
  pin_memory: true
  batch_size: 16

model:
  type: "dct_gan"
  
  encoder:
    type: "resnet"
    num_residual_blocks: 9
    base_channels: 64
    input_channels: 6
    use_dropout: true
    dropout_rate: 0.2
    residual_scale: 0.1
  
  decoder:
    type: "cnn"
    num_layers: 6
    base_channels: 64
    output_channels: 3
  
  discriminator:
    type: "xunet_modified"
    input_channels: 3
    base_channels: 32
    kernel_size: 5
    num_conv_layers: 5
    use_srm: false
    use_spectral_norm: true

dct:
  block_size: 8
  use_zig_zag: true
  frequency_selection: "chaotic_map"
  embed_in_ac: true

# ============================================================================
# LOSS: ADVERSARIAL REDUCIDO PARA ESTABILIDAD
# ============================================================================
loss:
  alpha: 2.0
  beta: 10.0
  
  # *** REDUCIR gamma para evitar colapso ***
  gamma: 0.5  # Era 1.0, ahora 0.5 (menos agresivo)

  mse_loss:
    type: "mse"
    reduction: "mean"
  
  crossentropy_loss:
    type: "crossentropy"
    reduction: "mean"
  
  adversarial_loss:
    type: "wgan"
    clip_value: 0.01

# ============================================================================
# TRAINING: LEARNING RATES MÁS BAJOS
# ============================================================================
training:
  num_epochs: 100
  
  update_strategy:
    discriminator_updates_per_batch: 5
    generator_updates_per_batch: 1
  
  gradient_clipping:
    enabled: true
    max_norm: 1.0  # Mantener clipping
  
  optimizer:
    generator:
      type: "adam"
      lr: 5.0e-4      # Era 1e-3, ahora 5e-4 (más bajo)
      betas: [0.9, 0.999]
      weight_decay: 0.001  # Era 0.0001, ahora 0.001 (más regularización)
    
    discriminator:
      type: "adam"
      lr: 1.0e-4      # Era 5e-4, ahora 1e-4 (MUY bajo para estabilidad)
      betas: [0.0, 0.9]  # Era [0.5, 0.999], ahora [0.0, 0.9] (más estable para discriminador)
      weight_decay: 0.001  # Era 0.0001, ahora 0.001

scheduler:
  type: "step_lr"
  step_size: 30
  gamma: 0.5

hardware:
  device: "cuda"
  num_gpus: 1
  mixed_precision: true

logging:
  log_frequency: 10
  save_frequency: 5
  metrics:
    - psnr
    - ssim
    - mse
    - rmse
    - discriminator_loss
    - generator_loss
    - adversarial_loss

early_stopping:
  enabled: true
  patience: 30
  metric: "psnr"
  mode: "max"

# =============================================================================
# EXPLICACIÓN DE LOS CAMBIOS:
# =============================================================================
#
# EXPERIMENTO 13 (residual_with_discriminator.yaml):
#   - LR_G: 1e-3, LR_D: 5e-4
#   - Gamma: 1.0 (adversarial fuerte)
#   - Resultado: Epochs 1-3 excelentes (35 dB), luego colapso en ep 17 (NaN)
#
# ESTE EXPERIMENTO (14 - residual_with_discriminator_stable.yaml):
#   - LR_G: 5e-4 (2× más bajo)
#   - LR_D: 1e-4 (5× más bajo) ← CLAVE para estabilidad
#   - Gamma: 0.5 (menos peso adversarial)
#   - Betas D: [0.0, 0.9] (más conservador)
#   - Weight decay: 10× mayor (regularización fuerte)
#
# EXPECTATIVA:
#   - Training más lento pero ESTABLE
#   - PSNR debería crecer gradualmente sin colapsar
#   - Target: 28-32 dB sostenido sin NaN
#
# SEÑALES DE ÉXITO:
#   ✅ Loss_D entre -1.0 y 1.0 (no -20)
#   ✅ D(x) y D(G(z)) en rango razonable (-5 a 5)
#   ✅ PSNR mejora gradual sin drops súbitos
#   ✅ NO aparecen NaN
#
# SEÑALES DE PROBLEMA:
#   ⚠️ Loss_D < -10 (discriminador dominando)
#   ⚠️ D(x) = D(G(z)) (mode collapse)
#   ❌ NaN aparece (detener inmediatamente)
#
# =============================================================================
